# Release workflow: build per-architecture tarballs and update the Homebrew tap.
#
# Triggered on GitHub Release publish. Two jobs:
#   1. build-tarball — creates agent-ear-<version>-<os>-<arch>.tar.gz
#   2. update-tap    — bumps the formula in Aurelian-Shuttleworth/homebrew-tools
#
# Prerequisites:
#   - HOMEBREW_TAP_TOKEN secret: a GitHub PAT with `repo` scope on the tap repo

name: Release — Homebrew

on:
  release:
    types: [published]

permissions: read-all

jobs:
  build-tarball:
    name: Build tarball (arm64)
    runs-on: macos-latest  # Apple Silicon
    permissions:
      contents: write  # upload release assets
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Verify build (Nix)
        run: nix flake check

      - name: Build release tarball
        run: |
          VERSION="${{ github.event.release.tag_name }}"

          # Build the Python wheel. The Nix dev shell provides Python +
          # project deps, but its site-packages is read-only.  Use a
          # temporary venv that inherits the system packages and adds
          # only the 'build' frontend.
          nix develop --command bash -c '
            python -m venv --system-site-packages .build-venv
            .build-venv/bin/pip install --quiet "build==1.2.2"
            cd src
            ../.build-venv/bin/python -m build --wheel --outdir ../dist/
          '
          rm -rf .build-venv

          # Package everything Homebrew needs into a clean tarball:
          #   - dist/*.whl         (Python wheel)
          #   - scripts/agent-ear.sh (Bash TUI dispatcher)
          #   - templates/         (prompt templates)
          #   - src/pyproject.toml (for pip install metadata)
          mkdir -p staging/scripts staging/templates staging/src
          cp dist/*.whl staging/
          cp scripts/agent-ear.sh staging/scripts/
          cp -r templates/* staging/templates/
          cp src/pyproject.toml staging/src/

          tar -czf "agent-ear-${VERSION}-darwin-arm64.tar.gz" \
            -C staging .

      - name: Upload to Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: agent-ear-*.tar.gz

  update-tap:
    name: Update Homebrew tap
    needs: build-tarball
    runs-on: ubuntu-latest
    permissions: {}  # uses HOMEBREW_TAP_TOKEN, not GITHUB_TOKEN
    steps:
      - name: Bump formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          TARBALL_URL="https://github.com/Aurelian-Shuttleworth/agent-ear/archive/refs/tags/${TAG}.tar.gz"

          # 1. Download tarball and compute sha256
          SHA=$(curl -fsSL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "Computed sha256: ${SHA}"

          # 2. Clone the tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Aurelian-Shuttleworth/homebrew-tools.git" tap
          cd tap

          # 3. Update url and sha256 in the formula
          FORMULA="Formula/agent-ear.rb"
          sed -i 's|url "https://github.com/Aurelian-Shuttleworth/agent-ear/archive/refs/tags/.*"|url "'"${TARBALL_URL}"'"|' "$FORMULA"
          sed -i 's|sha256 ".*"|sha256 "'"${SHA}"'"|' "$FORMULA"

          # 4. Verify the update (fail fast if sed didn't match)
          grep -q "$TAG" "$FORMULA" || { echo "ERROR: tag not found in formula after sed"; exit 1; }
          grep -q "$SHA" "$FORMULA" || { echo "ERROR: sha256 not found in formula after sed"; exit 1; }

          # 5. Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git diff --cached --quiet && { echo "Formula already up-to-date"; exit 0; }
          git commit -m "agent-ear ${TAG}"
          git push


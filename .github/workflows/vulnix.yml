name: "Vulnerability Scan — Nix Closure"

on:
  push:
    branches: ["main"]
    paths:
      - "flake.lock"
      - "uv.lock"
      - "pyproject.toml"
      - "flake.nix"
      - "nix/**"
  pull_request:
    branches: ["main"]
    paths:
      - "flake.lock"
      - "uv.lock"
      - "pyproject.toml"
      - "flake.nix"
      - "nix/**"
  schedule:
    - cron: "30 3 * * 1" # Monday 03:30 UTC (after Dependabot PRs)

permissions: read-all

jobs:
  vulnix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Build package
        run: nix build --print-build-logs

      - name: Scan Nix closure with vulnix
        run: |
          nix run nixpkgs#vulnix -- \
            --json \
            --closure \
            --whitelist .vulnix-whitelist.toml \
            ./result > vulnix-report.json 2>&1 || true

          # Parse results and report
          if [ -s vulnix-report.json ]; then
            echo "::group::Vulnix Report"
            cat vulnix-report.json
            echo "::endgroup::"

            # Count vulnerabilities (non-whitelisted)
            VULN_COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('vulnix-report.json'))
              if isinstance(data, list):
                  print(len(data))
              else:
                  print(0)
          except (json.JSONDecodeError, FileNotFoundError):
              print(0)
          ")

            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "::warning::vulnix found $VULN_COUNT vulnerable packages in the Nix closure. Review vulnix-report.json."
            else
              echo "✅ No vulnerabilities found in Nix closure."
            fi
          else
            echo "✅ No vulnerabilities found in Nix closure."
          fi

      - name: Upload vulnix report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vulnix-report
          path: vulnix-report.json
          retention-days: 30
          if-no-files-found: ignore
